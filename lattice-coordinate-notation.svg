<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Coordinate notation for toric-code edges and faces</title>
  <desc id="desc">A small lattice fragment labeling H(1,1), V(1,1), and face F(1,1) with its boundary edges H(1,1), H(1,2), V(1,1), and V(2,1).</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4b5563" />
    </marker>
  </defs>

  <!-- Highlighted face F(1,1) -->
  <rect x="280" y="80" width="160" height="120" fill="#8b7bbf" opacity="0.14" stroke="#7a6ba8" stroke-width="2" />

  <!-- Lattice edges -->
  <g stroke="#9ca3af" stroke-width="3" stroke-linecap="round">
    <!-- Horizontal -->
    <line x1="120" y1="80" x2="280" y2="80" />
    <line x1="280" y1="80" x2="440" y2="80" />
    <line x1="120" y1="200" x2="280" y2="200" />
    <line x1="280" y1="200" x2="440" y2="200" />
    <line x1="120" y1="320" x2="280" y2="320" />
    <line x1="280" y1="320" x2="440" y2="320" />

    <!-- Vertical -->
    <line x1="120" y1="80" x2="120" y2="200" />
    <line x1="120" y1="200" x2="120" y2="320" />
    <line x1="280" y1="80" x2="280" y2="200" />
    <line x1="280" y1="200" x2="280" y2="320" />
    <line x1="440" y1="80" x2="440" y2="200" />
    <line x1="440" y1="200" x2="440" y2="320" />
  </g>

  <!-- Highlighted boundary edges of F(1,1) -->
  <g stroke="#7a6ba8" stroke-width="5.5" stroke-linecap="round">
    <line x1="280" y1="200" x2="440" y2="200" />
    <line x1="280" y1="80" x2="440" y2="80" />
    <line x1="280" y1="80" x2="280" y2="200" />
    <line x1="440" y1="80" x2="440" y2="200" />
  </g>

  <!-- Vertices -->
  <g fill="#111827">
    <circle cx="120" cy="80" r="4.8" />
    <circle cx="280" cy="80" r="4.8" />
    <circle cx="440" cy="80" r="4.8" />
    <circle cx="120" cy="200" r="4.8" />
    <circle cx="280" cy="200" r="5.2" />
    <circle cx="440" cy="200" r="5.2" />
    <circle cx="120" cy="320" r="4.8" />
    <circle cx="280" cy="320" r="4.8" />
    <circle cx="440" cy="320" r="4.8" />
  </g>

  <!-- Primary annotations -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#374151">
    <!-- Horizontal edge H(1,1) -->
    <text x="330" y="182" font-size="19">H(1,1)</text>
    <line x1="356" y1="186" x2="356" y2="198" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Vertical edge V(1,1) -->
    <text x="296" y="145" font-size="19">V(1,1)</text>
    <line x1="292" y1="148" x2="283" y2="148" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Face label -->
    <text x="336" y="146" font-size="20" fill="#5f4f8e">F(1,1)</text>

    <!-- Vertex labels for H(1,1) endpoints -->
    <text x="242" y="218" font-size="16">(1,1)</text>
    <text x="402" y="218" font-size="16">(2,1)</text>
    <text x="241" y="68" font-size="16">(1,2)</text>
  </g>

  <!-- Boundary-edge labels on face -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#5f4f8e">
    <text x="336" y="222">H(1,1)</text>
    <text x="336" y="66">H(1,2)</text>
    <text x="216" y="145">V(1,1)</text>
    <text x="458" y="145">V(2,1)</text>
  </g>
</svg>
